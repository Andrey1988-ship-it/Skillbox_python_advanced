name: Run Pytest

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: microblog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx 

      - name: Run tests
        env:
          # Передаем адрес базы через localhost, так как pytest запущен на хост-машине
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/microblog
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          mkdir -p backend/static 
          cd backend && pytest
