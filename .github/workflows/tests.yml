name: Run Pytest

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx 

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/test_db
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: test_db
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          mkdir -p backend/static
          
          # Принудительно перезаписываем .env внутри backend, чтобы исключить старые настройки
          echo "DATABASE_URL=postgresql+asyncpg://user:password@localhost:5432/test_db" > backend/.env
          echo "DB_HOST=localhost" >> backend/.env
          echo "DB_PORT=5432" >> backend/.env
          echo "DB_USER=user" >> backend/.env
          echo "DB_PASSWORD=password" >> backend/.env
          echo "DB_NAME=test_db" >> backend/.env
          
          cd backend && pytest
