name: Run Pytest

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx  # Гарантируем наличие тестовых библиотек

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend # Говорим Python искать модули в папке backend
        run: |
          cd backend && pytest
