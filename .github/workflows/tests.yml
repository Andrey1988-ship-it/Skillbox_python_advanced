name: Run Pytest

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx 

      - name: Run tests
        env:
          # Переменные для конфигурации через единый URL
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/test_db

          # Раздельные переменные (переопределяют хост с 'db' на 'localhost')
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: test_db

          # Предотвращает чтение локального файла .env, если используется python-dotenv
          PIPENV_DONT_LOAD_DOTENV: 1
          DONT_LOAD_DOTENV: 1

          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          mkdir -p backend/static 
          cd backend && pytest
